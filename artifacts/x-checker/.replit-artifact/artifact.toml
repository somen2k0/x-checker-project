kind = "web"
previewPath = "/"
title = "X Account Checker"
version = "1.0.0"
id = "artifacts/x-checker"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24068

[services.development]
run = "pnpm --filter @workspace/x-checker run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/x-checker", "run", "build" ]
publicDir = "artifacts/x-checker/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24068"
BASE_PATH = "/"
