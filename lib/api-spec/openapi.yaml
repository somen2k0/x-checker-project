openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: accounts
    description: X (Twitter) account checking
  - name: email
    description: Gmail / email address checking
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /check-accounts:
    post:
      operationId: checkAccounts
      tags: [accounts]
      summary: Check X account statuses
      description: Checks whether X (Twitter) accounts are active, suspended, or not found
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckAccountsBody"
      responses:
        "200":
          description: Results for each username
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckAccountsResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /check-emails:
    post:
      operationId: checkEmails
      tags: [email]
      summary: Check email address validity and deliverability
      description: Validates email format, Gmail username rules, and domain MX records
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckEmailsBody"
      responses:
        "200":
          description: Results for each email
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckEmailsResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    CheckAccountsBody:
      type: object
      properties:
        usernames:
          type: array
          items:
            type: string
          minItems: 1
          maxItems: 100
      required:
        - usernames
    AccountStatus:
      type: string
      enum:
        - active
        - suspended
        - not_found
        - unknown
    AccountCheckResult:
      type: object
      properties:
        username:
          type: string
        status:
          $ref: "#/components/schemas/AccountStatus"
        displayName:
          type: ["string", "null"]
        profileImageUrl:
          type: ["string", "null"]
        followerCount:
          type: ["integer", "null"]
        followingCount:
          type: ["integer", "null"]
        isVerified:
          type: ["boolean", "null"]
        createdAt:
          type: ["string", "null"]
        error:
          type: ["string", "null"]
      required:
        - username
        - status
    CheckAccountsResponse:
      type: object
      properties:
        results:
          type: array
          items:
            $ref: "#/components/schemas/AccountCheckResult"
      required:
        - results
    CheckEmailsBody:
      type: object
      properties:
        emails:
          type: array
          items:
            type: string
          minItems: 1
          maxItems: 500
      required:
        - emails
    EmailStatus:
      type: string
      enum:
        - valid
        - invalid_format
        - invalid_domain
        - disposable
        - unknown
    EmailCheckResult:
      type: object
      properties:
        email:
          type: string
        status:
          $ref: "#/components/schemas/EmailStatus"
        reason:
          type: ["string", "null"]
        isGmail:
          type: boolean
        normalizedEmail:
          type: ["string", "null"]
      required:
        - email
        - status
        - isGmail
    CheckEmailsResponse:
      type: object
      properties:
        results:
          type: array
          items:
            $ref: "#/components/schemas/EmailCheckResult"
      required:
        - results
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
